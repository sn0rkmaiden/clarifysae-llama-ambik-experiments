experiment_name: 8b_sweep_base
seed: 42

model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: bfloat16
  device_map: auto
  attn_implementation: null

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0

prompting:
  template: no_help
  use_chat_template: auto

steering:
  enabled: true
  method: custom
  loader: dictionary_learning
  sae_repo: andyrdt/saes-llama-3.1-8b-instruct

  # placeholders; sweep.py will overwrite hookpoint
  hookpoint: model.layers.19
  module_path: model.layers.19
  sae_file: resid_post_layer_19/trainer_1

  # placeholders; sweep.py will overwrite these
  feature_indices: [0]
  strength: 1.0

  mode: additive
  apply_to: all_positions
  steer_generated_tokens_only: true

  runtime:
    normalize_reconstruction: true
    preserve_unsteered_residual: true
    clamp_latents: null
    log_feature_acts: false

batching:
  batch_size: 1

dataset:
  path: data/raw/ambik/ambik_calib_100.csv
  limit: null

output:
  root_dir: outputs

evaluation:
  protocol: separated
  max_questions: 3
  embed_threshold: 0.75
  enable_nli: false
  brevity_max: 1