experiment_name: 1b_sweep_base_float16
seed: 42

model:
  name: unsloth/Llama-3.2-1B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0

prompting:
  template: no_help
  use_chat_template: auto

steering:
  enabled: true
  method: custom
  loader: sparsify
  sae_repo: apart/llama3.2_1b_instruct_saes_vader

  # placeholders; sweep.py will overwrite these
  hookpoint: model.layers.10
  module_path: model.layers.10
  feature_indices: [0]
  strength: 1.0

  mode: additive
  apply_to: all_positions
  steer_generated_tokens_only: true

  runtime:
    normalize_reconstruction: true
    preserve_unsteered_residual: true
    clamp_latents: null
    log_feature_acts: false

batching:
  batch_size: 2

dataset:
  path: data/raw/ambik/ambik_calib_100.csv
  limit: null

output:
  root_dir: outputs

evaluation:
  protocol: combined_json
  max_questions: 3
  embed_threshold: 0.75
  enable_nli: false
  brevity_max: 1
