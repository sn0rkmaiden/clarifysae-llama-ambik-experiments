experiment_name: extract_ambik_clarification_vectors
seed: 42

model:
  name: unsloth/Llama-3.2-1B-Instruct
  torch_dtype: float16
  device_map: auto

generation:
  max_new_tokens: 1
  do_sample: false

prompting:
  use_chat_template: false

concept_discovery:
  dataset_path: outputs/ambik/ambik_concept_corpus.jsonl
  output_path: outputs/concept_vectors/llama32_1b_ambik_vectors.pt
  concepts: [ambiguity_state, ask_trajectory, targeted_question, restraint_on_clear]
  hookpoints: [model.layers.8, model.layers.10, model.layers.12, model.layers.14]
  module_paths: {}
  batch_size: 8
  max_length: 512
  pooling: recommended
  mean_after_token: 50
  methods: [paired_difference, difference_in_means, ridge_probe]
  pair_id_field: pair_id
  ridge_l2: 1.0
  fit_splits: [train]
  eval_splits: [dev]
  neutral_pca:
    required: true
    concepts_by_pooling:
      last_nonpad: [neutral_prompt]
      assistant_mean: [neutral_response]
    variance_fraction: 0.5
    max_components: 64
