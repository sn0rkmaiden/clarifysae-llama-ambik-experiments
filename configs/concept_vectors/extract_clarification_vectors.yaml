experiment_name: extract_clarification_actor_vectors
seed: 42

model:
  name: unsloth/Llama-3.2-1B-Instruct
  torch_dtype: float16
  device_map: auto

generation:
  max_new_tokens: 1
  do_sample: false

prompting:
  # Synthetic actor transcripts already contain explicit user/assistant markers.
  use_chat_template: false

concept_discovery:
  dataset_path: outputs/synthetic/clarification_counterfactuals.jsonl
  output_path: outputs/concept_vectors/llama32_1b_clarification_actor_vectors.pt
  concepts: [ask_trajectory, targeted_question]
  hookpoints:
    - model.layers.8
    - model.layers.10
    - model.layers.12
    - model.layers.14
  module_paths: {}
  batch_size: 8
  max_length: 512
  pooling: recommended
  mean_after_token: 50
  methods: [paired_difference]
  pair_id_field: pair_id
  ridge_l2: 1.0
  fit_splits: [train]
  eval_splits: [dev]

  # v_actor = .5*(targeted - silent guess) + .5*(targeted - generic question)
  composite_vectors:
    - name: targeted_clarification
      method: composite_paired_difference
      components:
        - concept: ask_trajectory
          method: paired_difference
          weight: 0.5
        - concept: targeted_question
          method: paired_difference
          weight: 0.5
      diagnostic_concepts:
        ask_vs_guess: ask_trajectory
        targeted_vs_generic: targeted_question

  neutral_pca:
    required: true
    concepts_by_pooling:
      assistant_mean: [neutral_response]
    variance_fraction: 0.5
    max_components: 64
