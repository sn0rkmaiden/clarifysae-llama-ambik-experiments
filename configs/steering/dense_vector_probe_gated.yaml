experiment_name: ambik_dense_vector_probe_gated
seed: 42

model:
  name: unsloth/Llama-3.2-1B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto

generation:
  max_new_tokens: 96
  do_sample: false

prompting:
  template: no_help
  use_chat_template: auto

steering:
  enabled: true
  method: dense_vector
  vector_path: outputs/concept_vectors/llama32_1b_clarification_vectors.pt
  vector_key: ask_trajectory__paired_difference__model_layers_10
  hookpoint: model.layers.10
  module_path: model.layers.10

  # Match Anthropic's convention more closely: scale by the average residual
  # norm recorded during vector extraction, not the current token's norm.
  # Sweep both signs and small magnitudes.
  strength: 0.02
  scale_mode: recorded_residual_norm_fraction
  normalize_vector: true
  apply_to: last_position
  steer_generated_tokens_only: true
  norm_cap: null

  # The ambiguity-state probe is evaluated on the final prompt token and cached
  # for generation. This separates when-to-ask from how-to-ask.
  gate:
    enabled: true
    vector_path: outputs/concept_vectors/llama32_1b_clarification_vectors.pt
    vector_key: ambiguity_state__ridge_probe__model_layers_10
    mode: sigmoid
    threshold: 0.0
    # null uses the post-PCA calibrated score scale stored in the vector bundle.
    temperature: null

batching:
  batch_size: 2

dataset:
  path: data/raw/ambik/ambik_calib_100.csv
  limit: null

output:
  root_dir: outputs

evaluation:
  protocol: combined_json
  max_questions: 3
  embed_threshold: 0.75
  enable_nli: false
  brevity_max: 1
