experiment_name: clarq_gemma2_9b_sweep_base
seed: 42

model:
  name: google/gemma-2-9b-it
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0

prompting:
  use_chat_template: true
  system_prompt: ''

steering:
  enabled: true
  loader: saelens
  sae_repo: gemma-scope-9b-it-res
  sae_id: layer_20/width_16k/average_l0_91
  hookpoint: blocks.20.hook_resid_post
  module_path: model.layers.20
  feature_indices: [0]
  strength: 1.0
  mode: decoder_vector
  apply_to: all_positions
  steer_generated_tokens_only: false
  runtime:
    max_act: null
    normalize_reconstruction: false
    preserve_unsteered_residual: false
    clamp_latents: null
    log_feature_acts: false

provider_model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

provider_generation:
  max_new_tokens: 128
  do_sample: false
  temperature: 0.0
  top_p: 1.0

provider_prompting:
  use_chat_template: true
  system_prompt: ''

judge_model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null

judge_generation:
  max_new_tokens: 128
  do_sample: false
  temperature: 0.0
  top_p: 1.0

judge_prompting:
  use_chat_template: true
  system_prompt: ''

clarq:
  dataset_path: data/raw/clarq/English
  evaluation_set: '0'
  player_chat_mode: false
  multi_info_provider_agent: false
  max_turns_cap: 22
  write_html_report: true
  unload_models_before_judge: true

console:
  show_progress: true
  suppress_transformers_warnings: true

output:
  root_dir: outputs
