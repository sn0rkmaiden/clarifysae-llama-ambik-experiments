experiment_name: clarq_gemma_2b_sweep_base
seed: 42

model:
  name: google/gemma-2b-it
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null

generation:
  max_new_tokens: 96
  do_sample: false
  temperature: 0.0
  top_p: 1.0

prompting:
  use_chat_template: true
  system_prompt: ''

steering:
  enabled: true
  loader: saelens
  sae_repo: gemma-2b-it-res-jb
  sae_id: blocks.12.hook_resid_post
  hookpoint: blocks.12.hook_resid_post
  module_path: model.layers.12
  feature_indices: [0]
  strength: 1.0
  mode: decoder_vector
  apply_to: all_positions
  steer_generated_tokens_only: false
  runtime:
    max_act: null
    normalize_reconstruction: false
    preserve_unsteered_residual: false
    clamp_latents: null
    log_feature_acts: false

provider_model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null

provider_generation:
  max_new_tokens: 128
  do_sample: false
  temperature: 0.0
  top_p: 1.0

provider_prompting:
  use_chat_template: true
  system_prompt: ''

judge_model:
  name: unsloth/Llama-3.1-8B-Instruct
  backend: hf
  torch_dtype: float16
  device_map: auto
  attn_implementation: null

judge_generation:
  max_new_tokens: 128
  do_sample: false
  temperature: 0.0
  top_p: 1.0

judge_prompting:
  use_chat_template: true
  system_prompt: ''

clarq:
  dataset_path: data/raw/clarq/English
  evaluation_set: '0'
  player_chat_mode: false
  multi_info_provider_agent: false
  max_turns_cap: 22
  write_html_report: true
  unload_models_before_judge: true

console:
  show_progress: true
  suppress_transformers_warnings: true

output:
  root_dir: outputs
